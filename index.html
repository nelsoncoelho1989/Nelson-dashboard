function rangeBarSVG(min, max, idealMin, idealMax, cur, color){
  const W=260, H=40, padX=12;
  const pct = v => padX + Math.max(0,Math.min(1,(v-min)/(max-min))) * (W-padX*2);
  const x1=pct(idealMin), x2=pct(idealMax), xc=pct(cur);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin-top:6px">
    <line x1="${padX}" y1="20" x2="${W-padX}" y2="20" stroke="${C.border}" stroke-width="4" stroke-linecap="round"/>
    <line x1="${x1.toFixed(1)}" y1="20" x2="${x2.toFixed(1)}" y2="20" stroke="${color}" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <circle cx="${xc.toFixed(1)}" cy="20" r="6" fill="${color}"/>
    <circle cx="${xc.toFixed(1)}" cy="20" r="9" fill="${color}" opacity="0.25"/>
    <text x="${padX}" y="36" fill="${C.sub}" font-size="8" text-anchor="start">${min}</text>
    <text x="${W-padX}" y="36" fill="${C.sub}" font-size="8" text-anchor="end">${max}</text>
  </svg>`;
}
function sparklineSVG(points, color){
  const W=260, H=54, padL=6, padR=6, padT=8, padB=14;
  const vals = points.map(p=>p.y);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max-min)||1;
  const xStep = (W-padL-padR)/(points.length-1||1);
  const yOf = v => padT + (max-v)/range*(H-padT-padB);
  const xOf = i => padL + i*xStep;
  const path = points.map((p,i)=>`${i===0?'M':'L'} ${xOf(i).toFixed(1)} ${yOf(p.y).toFixed(1)}`).join(" ");
  const dots = points.map((p,i)=>`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(p.y).toFixed(1)}" r="${i===points.length-1?4:2.5}" fill="${color}"/>`).join("");
  const labels = points.map((p,i)=>`<text x="${xOf(i).toFixed(1)}" y="${H-2}" text-anchor="middle" fill="${C.sub}" font-size="8">${p.x}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin-top:6px">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

function hrZoneBarSVG(avg, maxHr){
  const W=260, H=42, min=100, max=185, padX=10;
  const zones = [
    {from:100,to:130,color:C.z1},{from:130,to:145,color:C.z2},
    {from:145,to:153,color:C.z3},{from:153,to:162,color:C.z4},{from:162,to:185,color:C.z5},
  ];
  const xOf = v => padX + (Math.max(min,Math.min(max,v))-min)/(max-min)*(W-padX*2);
  const segs = zones.map(z=>`<rect x="${xOf(z.from).toFixed(1)}" y="10" width="${(xOf(z.to)-xOf(z.from)).toFixed(1)}" height="10" fill="${z.color}" opacity="0.5"/>`).join("");
  let markers = "";
  if (avg) markers += `<circle cx="${xOf(avg).toFixed(1)}" cy="15" r="5" fill="${C.text}" stroke="${C.bg}" stroke-width="1.5"/>
    <text x="${xOf(avg).toFixed(1)}" y="34" text-anchor="middle" fill="${C.text}" font-size="8" font-weight="700">${avg} méd</text>`;
  if (maxHr) markers += `<line x1="${xOf(maxHr).toFixed(1)}" y1="8" x2="${xOf(maxHr).toFixed(1)}" y2="22" stroke="${C.orange}" stroke-width="2"/>
    <text x="${xOf(maxHr).toFixed(1)}" y="${avg?42:34}" text-anchor="middle" fill="${C.orange}" font-size="8" font-weight="700">${maxHr} máx</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin-top:6px">
    ${segs}${markers}
  </svg>`;
}
function paceCompareSVG(tMin,tMax,rMin,rMax,color){
  const fmt = s => `${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,"0")}`;
  const vals=[tMin,tMax,rMin,rMax];
  const lo=Math.min(...vals)-6, hi=Math.max(...vals)+6;
  const W=260,H=54,padX=14;
  const xOf = v => padX + (hi-v)/(hi-lo)*(W-padX*2);
  const tx1=xOf(tMax), tx2=xOf(tMin), rx1=xOf(rMax), rx2=xOf(rMin);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin-top:6px">
    <text x="${padX}" y="10" fill="${C.sub}" font-size="8">PREVISTO</text>
    <rect x="${tx1.toFixed(1)}" y="14" width="${(tx2-tx1).toFixed(1)}" height="8" rx="4" fill="${C.sub}" opacity="0.5"/>
    <text x="${padX}" y="36" fill="${color}" font-size="8">REAL</text>
    <rect x="${rx1.toFixed(1)}" y="40" width="${(rx2-rx1).toFixed(1)}" height="8" rx="4" fill="${color}"/>
    <text x="${tx1.toFixed(1)}" y="26" text-anchor="middle" fill="${C.sub}" font-size="8" font-family="monospace">${fmt(tMax)}–${fmt(tMin)}</text>
    <text x="${rx1.toFixed(1)}" y="52" text-anchor="middle" fill="${color}" font-size="8" font-family="monospace" font-weight="700">${fmt(rMax)}–${fmt(rMin)}</text>
    <text x="${W-padX}" y="52" text-anchor="end" fill="${C.sub}" font-size="7">mais rápido →</text>
  </svg>`;
}

function vdotGaugeSVG(vdot, vdotEst){
  const W=320,H=200,cx=160,cy=175,Ro=126,Ri=96,VMIN=48,VMAX=63;
  const vToAngle = v => Math.PI*(1-(v-VMIN)/(VMAX-VMIN));
  const ptAt = (v,r) => { const a=vToAngle(v); return [+(cx+r*Math.cos(a)).toFixed(2), +(cy-r*Math.sin(a)).toFixed(2)]; };
  const arc = (v1,v2,R) => {
    const [x1,y1]=ptAt(v1,R), [x2,y2]=ptAt(v2,R);
    const large = Math.abs(vToAngle(v2)-vToAngle(v1))>Math.PI?1:0;
    return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
  };
  const estEnd = parseFloat((vdotEst||"").split("–")[1]) || (vdot+1.5);
  const [nx,ny]=ptAt(vdot,Ri+6), [nx2,ny2]=ptAt(vdot,Ro+5);
  let ticks="";
  [48,51,53,55,57,60,63].forEach(v=>{
    const [tx,ty]=ptAt(v,Ri-14),[t1x,t1y]=ptAt(v,Ri),[t2x,t2y]=ptAt(v,Ri-6);
    ticks += `<line x1="${t1x}" y1="${t1y}" x2="${t2x}" y2="${t2y}" stroke="${C.sub}" stroke-width="1.5"/>
      <text x="${tx}" y="${ty+3}" text-anchor="middle" fill="${C.sub}" font-size="8" font-family="monospace">${v}</text>`;
  });
  const [pax,pay]=ptAt(57,Ro+5),[pbx,pby]=ptAt(57,Ro+18),[plx,ply]=ptAt(57,Ro+28);
  const [tax,tay]=ptAt(60,Ro+5),[tbx,tby]=ptAt(60,Ro+18),[tlx,tly]=ptAt(60,Ro+28);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <path d="${arc(VMIN,VMAX,Ro)}" fill="none" stroke="${C.dim}" stroke-width="20" stroke-linecap="round"/>
    <path d="${arc(48,51.3,Ro)}" fill="none" stroke="${C.sub}" stroke-width="20" opacity="0.15"/>
    <path d="${arc(51.3,53,Ro)}" fill="none" stroke="${C.z3}" stroke-width="20" opacity="0.2"/>
    <path d="${arc(53,55,Ro)}" fill="none" stroke="${C.orange}" stroke-width="20" opacity="0.18"/>
    <path d="${arc(55,57,Ro)}" fill="none" stroke="${C.purple}" stroke-width="20" opacity="0.18"/>

function lineChartSVG(data, key, vdotRef){
  const W=300,H=140,padL=26,padR=10,padT=10,padB=18;
  const min=50, max=57;
  const xStep = (W-padL-padR)/(data.length-1);
  const yOf = v => padT + (max-v)/(max-min)*(H-padT-padB);
  const xOf = i => padL + i*xStep;
  let path = data.map((d,i)=>`${i===0?'M':'L'} ${xOf(i).toFixed(1)} ${yOf(d[key]).toFixed(1)}`).join(" ");
  let dots = data.map((d,i)=>`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(d[key]).toFixed(1)}" r="4" fill="${C.orange}"/>`).join("");
  let labels = data.map((d,i)=>`<text x="${xOf(i).toFixed(1)}" y="${H-4}" text-anchor="middle" fill="${C.sub}" font-size="8">${d.x}</text>`).join("");
  let yTicks=[50,52,54,56].map(v=>`<text x="4" y="${(yOf(v)+3).toFixed(1)}" fill="${C.sub}" font-size="8">${v}</text>
    <line x1="${padL}" y1="${yOf(v).toFixed(1)}" x2="${W-padR}" y2="${yOf(v).toFixed(1)}" stroke="${C.border}" stroke-dasharray="3 3"/>`).join("");
  const refY = yOf(vdotRef).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${yTicks}
    <line x1="${padL}" y1="${refY}" x2="${W-padR}" y2="${refY}" stroke="${C.orange}" stroke-dasharray="4 3" stroke-width="1"/>
    <path d="${path}" fill="none" stroke="${C.orange}" stroke-width="2.5"/>
    ${dots}${labels}
  </svg>`;
}

function barChartSVG(data){
  const W=300,H=120,padL=24,padR=6,padT=6,padB=16;
  const max = Math.max(...data.map(d=>d.km))*1.15;
  const bw = (W-padL-padR)/data.length*0.6;
  const step = (W-padL-padR)/data.length;
  let bars = data.map((d,i)=>{
    const h = (d.km/max)*(H-padT-padB);
    const x = padL + i*step + (step-bw)/2;
    const y = H-padB-h;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="5" fill="${d.cur?C.orange:C.dim}"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${H-4}" text-anchor="middle" fill="${C.sub}" font-size="8">${d.w}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${bars}</svg>`;
}

    <div style="background:${C.bg};min-height:100vh;color:${C.text}">
      <div style="background:${C.card};border-bottom:1px solid ${C.border};padding:14px 18px 10px;position:sticky;top:0;z-index:20">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div style="color:${C.sub};font-size:8px;letter-spacing:3px;text-transform:uppercase">M35 · QUELUZ</div>
            <div style="font-size:17px;font-weight:800;letter-spacing:-0.5px">Nelson Coelho</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <div style="display:flex;align-items:center;gap:6px">
              ${Badge(D.trainingStatus, C.z1)}
              <button data-refresh style="background:${C.card2};border:1px solid ${C.border};color:${C.teal};
                border-radius:6px;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;
                align-items:center;justify-content:center;padding:0">⟳</button>
            </div>
            <div style="font-size:8px;color:${C.teal};letter-spacing:1px">${D.meta.updatedAt}</div>
          </div>
        </div>
        ${renderTabs()}
      </div>
      <div style="padding:16px 14px 48px">${panel}</div>
      <div style="text-align:center;color:${C.dim};font-size:8px;letter-spacing:1.5px;margin-top:0;padding-bottom:20px;text-transform:uppercase">
        Garmin · Strava · GetFast · ${D.meta.updatedAt}
      </div>
    </div>`;

  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      TAB = btn.getAttribute("data-tab");
      localStorage.setItem("nc_tab", TAB);
      OPEN_IDX = null;
      OPEN_METRIC = null;
      render();
      window.scrollTo(0,0);
    });
  });

  document.querySelectorAll("[data-metric]").forEach(row=>{
    row.addEventListener("click", ()=>{
      const k = row.getAttribute("data-metric");
      OPEN_METRIC = OPEN_METRIC===k ? null : k;
      render();
    });
  });

  document.querySelectorAll("[data-session]").forEach(row=>{
    row.addEventListener("click", ()=>{
      const i = parseInt(row.getAttribute("data-session"), 10);
      OPEN_IDX = OPEN_IDX===i ? null : i;
      render();
    });
  });

  const refreshBtn = document.querySelector("[data-refresh]");
  if (refreshBtn) {
    refreshBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      refreshBtn.textContent = "…";
      try {
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }
      } catch (err) {}
      location.reload(true);
    });
  }
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then((reg) => {
      reg.update();
    }).catch(()=>{});
  });
}
</script>
</body>
</html>

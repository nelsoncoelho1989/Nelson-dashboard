// ── VDOT GAUGE (SVG puro) ──
function VDOTGauge({ vdot=53, vdotEst="54–55" }) {
  const W=320,H=200,cx=160,cy=175,Ro=126,Ri=96,VMIN=48,VMAX=63;
  const vToAngle=v=>Math.PI*(1-(v-VMIN)/(VMAX-VMIN));
  const ptAt=(v,r)=>{const a=vToAngle(v);return[+(cx+r*Math.cos(a)).toFixed(2),+(cy-r*Math.sin(a)).toFixed(2)];};
  const arc=(v1,v2,R)=>{const[x1,y1]=ptAt(v1,R),[x2,y2]=ptAt(v2,R);const large=Math.abs(vToAngle(v2)-vToAngle(v1))>Math.PI?1:0;return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;};
  const estEnd=parseFloat(vdotEst?.split("–")[1]||vdot+1.5);
  const[nx,ny]=ptAt(vdot,Ri+6),[nx2,ny2]=ptAt(vdot,Ro+5);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block",overflow:"visible"}}>
      <path d={arc(VMIN,VMAX,Ro)} fill="none" stroke={C.dim} strokeWidth="20" strokeLinecap="round"/>
      <path d={arc(48,51.3,Ro)} fill="none" stroke={C.sub} strokeWidth="20" opacity="0.15"/>
      <path d={arc(51.3,53,Ro)} fill="none" stroke={C.z3} strokeWidth="20" opacity="0.2"/>
      <path d={arc(53,55,Ro)} fill="none" stroke={C.orange} strokeWidth="20" opacity="0.18"/>
      <path d={arc(55,57,Ro)} fill="none" stroke={C.purple} strokeWidth="20" opacity="0.18"/>
      <path d={arc(57,63,Ro)} fill="none" stroke={C.teal} strokeWidth="20" opacity="0.18"/>
      <path d={arc(VMIN,vdot,Ro)} fill="none" stroke={C.orange} strokeWidth="20" strokeLinecap="round"/>
      <path d={arc(vdot,estEnd,Ro)} fill="none" stroke={C.orange} strokeWidth="20" strokeDasharray="6 5" opacity="0.55"/>
      <path d={arc(VMIN,VMAX,Ri)} fill="none" stroke={C.border} strokeWidth="2" strokeLinecap="round"/>
      {[48,51,53,55,57,60,63].map(v=>{
        const[tx,ty]=ptAt(v,Ri-14),[t1x,t1y]=ptAt(v,Ri),[t2x,t2y]=ptAt(v,Ri-6);
        return <g key={v}><line x1={t1x} y1={t1y} x2={t2x} y2={t2y} stroke={C.sub} strokeWidth="1.5"/>
          <text x={tx} y={ty+3} textAnchor="middle" fill={C.sub} fontSize="8" fontFamily="monospace">{v}</text></g>;
      })}
      {(()=>{const[ax,ay]=ptAt(57,Ro+5),[bx,by]=ptAt(57,Ro+18),[lx,ly]=ptAt(57,Ro+28);return<g><line x1={ax} y1={ay} x2={bx} y2={by} stroke={C.purple} strokeWidth="2"/><text x={lx} y={ly-5} textAnchor="middle" fill={C.purple} fontSize="9" fontWeight="700">PB</text><text x={lx} y={ly+5} textAnchor="middle" fill={C.purple} fontSize="8">'16</text></g>;})()}
      {(()=>{const[ax,ay]=ptAt(60,Ro+5),[bx,by]=ptAt(60,Ro+18),[lx,ly]=ptAt(60,Ro+28);return<g><line x1={ax} y1={ay} x2={bx} y2={by} stroke={C.teal} strokeWidth="2"/><text x={lx} y={ly-5} textAnchor="middle" fill={C.teal} fontSize="9" fontWeight="700">≤37'</text><text x={lx} y={ly+5} textAnchor="middle" fill={C.teal} fontSize="8">target</text></g>;})()}
      <line x1={nx} y1={ny} x2={nx2} y2={ny2} stroke={C.orange} strokeWidth="3" strokeLinecap="round"/>
      <circle cx={nx} cy={ny} r="4" fill={C.orange}/>

    </svg>
  );
}

// ── LINE CHART (SVG puro, substitui Recharts) ──
function VDOTLineChart({ data, vdotRef, pbRef }) {
  const W=320, H=150, padL=28, padR=14, padT=14, padB=20;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const vals = data.map(d=>d.vdot);
  const min = 50, max = 57;
  const x = i => padL + (i/(data.length-1)) * innerW;
  const y = v => padT + innerH - ((v-min)/(max-min)) * innerH;
  const [hover, setHover] = useState(null);
  const pathD = data.map((d,i)=>`${i===0?"M":"L"} ${x(i)} ${y(d.vdot)}`).join(" ");
  return (
    <div style={{position:"relative"}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}}>
        {[50,52,54,56].map(v=>(
          <line key={v} x1={padL} y1={y(v)} x2={W-padR} y2={y(v)} stroke={C.border} strokeWidth="1" strokeDasharray="3 3"/>
        ))}
        {[50,52,54,56].map(v=>(
          <text key={v} x={padL-5} y={y(v)+3} textAnchor="end" fill={C.sub} fontSize="8" fontFamily="monospace">{v}</text>
        ))}
        <line x1={padL} y1={y(vdotRef)} x2={W-padR} y2={y(vdotRef)} stroke={C.orange} strokeWidth="1" strokeDasharray="4 3"/>
        <line x1={padL} y1={y(pbRef)} x2={W-padR} y2={y(pbRef)} stroke={C.purple} strokeWidth="1" strokeDasharray="4 3"/>
        <path d={pathD} fill="none" stroke={C.orange} strokeWidth="2.5" strokeLinejoin="round"/>
        {data.map((d,i)=>(
          <circle key={i} cx={x(i)} cy={y(d.vdot)} r={hover===i?7:4} fill={C.orange}
            onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}
            onTouchStart={()=>setHover(i)} style={{cursor:"pointer"}}/>
        ))}
        {data.map((d,i)=>(
          <text key={i} x={x(i)} y={H-4} textAnchor="middle" fill={C.sub} fontSize="8">{d.x}</text>
        ))}
      </svg>
      {hover!==null && (
        <div style={{position:"absolute",top:0,left:0,background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",pointerEvents:"none"}}>
          <div style={{color:C.sub,fontSize:9}}>{data[hover].name}</div>
          <div style={{color:C.orange,fontSize:14,fontWeight:800,fontFamily:"monospace"}}>VDOT {data[hover].vdot}</div>
          <div style={{color:C.text,fontSize:10,fontFamily:"monospace"}}>{data[hover].time}</div>
        </div>
      )}
    </div>
  );
}

// ── BAR CHART (SVG puro, substitui Recharts) ──
function LoadBarChart({ data }) {
  const W=320, H=130, padL=24, padR=8, padT=8, padB=18;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const max = Math.max(...data.map(d=>d.km)) * 1.15;
  const bw = innerW / data.length * 0.6;
  const gap = innerW / data.length;
  const [hover, setHover] = useState(null);
  return (
    <div style={{position:"relative"}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}}>
        {[0,0.5,1].map(f=>{
          const v = max*f;
          const yy = padT + innerH - (v/max)*innerH;
          return <g key={f}>
            <line x1={padL} y1={yy} x2={W-padR} y2={yy} stroke={C.border} strokeWidth="1" strokeDasharray="3 3"/>
            <text x={padL-4} y={yy+3} textAnchor="end" fill={C.sub} fontSize="8" fontFamily="monospace">{Math.round(v)}</text>
          </g>;
        })}
        {data.map((d,i)=>{
          const bh = (d.km/max)*innerH;
          const bx = padL + i*gap + (gap-bw)/2;
          const by = padT + innerH - bh;
          return (
            <g key={i}>
              <rect x={bx} y={by} width={bw} height={bh} rx="4"
                fill={d.cur?C.orange:C.dim}
                onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}
                onTouchStart={()=>setHover(i)} style={{cursor:"pointer"}}/>
              <text x={bx+bw/2} y={H-4} textAnchor="middle" fill={C.sub} fontSize="9">{d.w}</text>
            </g>
          );
        })}
      </svg>
      {hover!==null && (
        <div style={{position:"absolute",top:0,left:0,background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",pointerEvents:"none"}}>
          <div style={{color:C.sub,fontSize:9}}>{data[hover].w}</div>
          <div style={{color:C.orange,fontSize:14,fontWeight:800,fontFamily:"monospace"}}>{data[hover].km} km</div>
        </div>
      )}
    </div>
  );
}

                  <div><div style={{color:C.sub,fontSize:8,letterSpacing:"1px"}}>RITMO</div><div style={{color:C.text,fontSize:11,fontFamily:"monospace"}}>{c.pace}</div></div>
                  <div><div style={{color:C.sub,fontSize:8,letterSpacing:"1px"}}>FC</div><div style={{color:C.text,fontSize:11,fontFamily:"monospace"}}>{c.fc}</div></div>
                  <div style={{flex:1}}><div style={{color:C.sub,fontSize:8,letterSpacing:"1px"}}>LEITURA</div><div style={{color:C.z1,fontSize:10}}>{c.read}</div></div>
                </div>
              </div>
            ))}
          </div>
        </>}
        {tab==="semana"&&<>
          <ST label={d.weekLabel} accent={C.orange}/>
          <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:"14px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.sub,fontSize:10}}>Volume semanal</span><span style={{color:C.text,fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{d.weekDone}<span style={{color:C.sub,fontSize:10}}>/{d.weekTarget} km</span></span></div>
            <div style={{background:C.border,borderRadius:6,height:10,overflow:"hidden",marginBottom:6}}><div style={{background:`linear-gradient(90deg,${C.teal},${C.orange})`,width:`${(d.weekDone/d.weekTarget)*100}%`,height:"100%",borderRadius:6}}/></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.teal,fontSize:9}}>✓ feito: {d.weekDone}km</span><span style={{color:C.sub,fontSize:9}}>restante: {(d.weekTarget-d.weekDone).toFixed(1)}km</span></div>
          </div>
          <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:16}}>
            {d.sessions.map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:i<d.sessions.length-1?`1px solid ${C.border}`:"none",opacity:s.status==="planned"?0.55:1,background:s.status==="today"?C.orange+"08":"transparent"}}>
                <div style={{color:C.sub,fontSize:9,width:38,flexShrink:0}}>{s.day}</div>
                <div style={{width:9,height:9,borderRadius:"50%",background:dotColor(s.status),marginRight:10,flexShrink:0,boxShadow:s.status==="today"?`0 0 8px ${C.orange}`:"none"}}/>
                <div style={{flex:1}}><span style={{color:s.status==="today"?C.orange:s.status==="race"?C.gold:C.text,fontSize:12,fontWeight:["today","race"].includes(s.status)?700:400}}>{s.icon} {s.code}</span></div>
                <span style={{color:C.sub,fontSize:10,fontFamily:"monospace",marginRight:8}}>{s.km}km</span>
                {s.status==="done"&&<span style={{color:C.teal,fontSize:12}}>✓</span>}
                {s.status==="today"&&<span style={{color:C.orange,fontSize:9,fontWeight:700,background:C.orange+"22",padding:"2px 6px",borderRadius:4}}>HOJE</span>}
                {s.status==="race"&&<span style={{color:C.gold,fontSize:9,fontWeight:700,background:C.gold+"22",padding:"2px 6px",borderRadius:4}}>PROVA</span>}
              </div>
            ))}
          </div>
          <ST label="Carga Semanal · km" accent={C.teal}/>
          <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:"14px 6px 8px",marginBottom:16}}>
            <LoadBarChart data={d.weeklyLoad}/>
          </div>
          <ST label="Training Status · Garmin" accent={C.purple}/>
          <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
              <div><div style={{color:C.z1,fontSize:14,fontWeight:800}}>{d.trainingStatus}</div><div style={{color:C.sub,fontSize:9}}>Garmin Training Status</div></div>
              <div style={{textAlign:"right"}}><div style={{color:C.teal,fontSize:18,fontWeight:800,fontFamily:"monospace"}}>{d.acwr.toFixed(2)}</div><div style={{color:C.sub,fontSize:9}}>ACWR · ÓTIMO</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{label:"Limiar Ritmo",value:d.ltPace+"/km",col:C.orange},{label:"LTHR",value:d.lthr+" bpm",col:C.orange},{label:"VO₂Max Garmin",value:d.vo2max,col:C.purple},{label:"Peso",value:d.weight+" kg",col:C.sub}].map((m,i)=>(
                <div key={i} style={{background:C.card2,borderRadius:8,padding:"8px 10px"}}><div style={{color:C.sub,fontSize:8,letterSpacing:"1px",textTransform:"uppercase"}}>{m.label}</div><div style={{color:m.col,fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{m.value}</div></div>
              ))}
            </div>
          </div>
        </>}
        {tab==="provas"&&<>
          <ST label="Calendário de Provas" accent={C.gold}/>
          <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:16}}>
            {d.races.map((r,i)=>(
              <div key={i} style={{padding:"12px 14px",borderBottom:i<d.races.length-1?`1px solid ${C.border}`:"none",borderLeft:`3px solid ${r.col}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{color:C.sub,fontSize:8,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:2}}>{r.prio}</div><div style={{color:r.prio==="PROVA A"?C.orange:C.text,fontSize:13,fontWeight:r.prio==="PROVA A"?800:600}}>{r.name}</div><div style={{color:C.sub,fontSize:10}}>{r.dist}</div></div>
                  <div style={{textAlign:"right",flexShrink:0}}><div style={{color:r.col,fontSize:12,fontWeight:700,fontFamily:"monospace"}}>{r.date}</div><div style={{color:C.sub,fontSize:9}}>em {r.days} dias</div></div>
                </div>
              </div>
            ))}
          </div>
          <ST label="★ Corrida do Tejo · 13 Set 2026" accent={C.orange}/>
          <div style={{background:C.card,borderRadius:12,border:`2px solid ${C.orange}44`,padding:"16px 14px"}}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{color:C.sub,fontSize:9,letterSpacing:"3px"}}>DIAS RESTANTES</div>
              <div style={{color:C.orange,fontSize:60,fontWeight:900,fontFamily:"'Courier New',monospace",lineHeight:1.1}}>86</div>
              <div style={{color:C.sub,fontSize:11}}>12 semanas e meia</div>
            </div>
            {d.phases.map((p,i)=>{
              const pc=p.status==="active"?C.orange:p.status==="next"?C.z3:p.status==="race"?C.gold:C.dim;
              return(
                <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                    <div style={{width:10,height:10,borderRadius:"50%",marginTop:3,flexShrink:0,background:pc,boxShadow:p.status==="active"?`0 0 10px ${C.orange}`:"none"}}/>
                    {i<d.phases.length-1&&<div style={{width:1.5,height:22,background:C.border,marginTop:3}}/>}
                  </div>
                  <div style={{paddingBottom:6}}><div style={{color:pc,fontSize:11,fontWeight:["active","race"].includes(p.status)?800:500}}>{p.label}</div><div style={{color:C.sub,fontSize:9}}>{p.weeks} · {p.km}</div></div>
                </div>
              );
            })}
          </div>
        </>}
        <div style={{textAlign:"center",color:C.dim,fontSize:8,letterSpacing:"1.5px",marginTop:20,textTransform:"uppercase"}}>Garmin · Strava · GetFast · {d.meta.updatedAt}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

} catch (e) {
  document.getElementById("root").innerHTML =
    '<div style="color:#FF5422;padding:24px;font-family:monospace;font-size:13px;white-space:pre-wrap;">ERRO AO CARREGAR:\n' + e.message + '\n\n' + (e.stack || '') + '</div>';
}
  </script>
</body>
</html>

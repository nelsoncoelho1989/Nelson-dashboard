function vdotGaugeSVG(vdot, vdotEst){
  const W=320,H=200,cx=160,cy=175,Ro=126,Ri=96,VMIN=48,VMAX=63;
  const vToAngle = v => Math.PI*(1-(v-VMIN)/(VMAX-VMIN));
  const ptAt = (v,r) => { const a=vToAngle(v); return [+(cx+r*Math.cos(a)).toFixed(2), +(cy-r*Math.sin(a)).toFixed(2)]; };
  const arc = (v1,v2,R) => {
    const [x1,y1]=ptAt(v1,R), [x2,y2]=ptAt(v2,R);
    const large = Math.abs(vToAngle(v2)-vToAngle(v1))>Math.PI?1:0;
    return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
  };
  const estEnd = parseFloat((vdotEst||"").split("–")[1]) || (vdot+1.5);
  const [nx,ny]=ptAt(vdot,Ri+6), [nx2,ny2]=ptAt(vdot,Ro+5);
  let ticks="";
  [48,51,53,55,57,60,63].forEach(v=>{
    const [tx,ty]=ptAt(v,Ri-14),[t1x,t1y]=ptAt(v,Ri),[t2x,t2y]=ptAt(v,Ri-6);
    ticks += `<line x1="${t1x}" y1="${t1y}" x2="${t2x}" y2="${t2y}" stroke="${C.sub}" stroke-width="1.5"/>
      <text x="${tx}" y="${ty+3}" text-anchor="middle" fill="${C.sub}" font-size="8" font-family="monospace">${v}</text>`;
  });
  const [pax,pay]=ptAt(57,Ro+5),[pbx,pby]=ptAt(57,Ro+18),[plx,ply]=ptAt(57,Ro+28);
  const [tax,tay]=ptAt(60,Ro+5),[tbx,tby]=ptAt(60,Ro+18),[tlx,tly]=ptAt(60,Ro+28);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <path d="${arc(VMIN,VMAX,Ro)}" fill="none" stroke="${C.dim}" stroke-width="20" stroke-linecap="round"/>
    <path d="${arc(48,51.3,Ro)}" fill="none" stroke="${C.sub}" stroke-width="20" opacity="0.15"/>
    <path d="${arc(51.3,53,Ro)}" fill="none" stroke="${C.z3}" stroke-width="20" opacity="0.2"/>
    <path d="${arc(53,55,Ro)}" fill="none" stroke="${C.orange}" stroke-width="20" opacity="0.18"/>
    <path d="${arc(55,57,Ro)}" fill="none" stroke="${C.purple}" stroke-width="20" opacity="0.18"/>
    <path d="${arc(57,63,Ro)}" fill="none" stroke="${C.teal}" stroke-width="20" opacity="0.18"/>
    <path d="${arc(VMIN,vdot,Ro)}" fill="none" stroke="${C.orange}" stroke-width="20" stroke-linecap="round"/>
    <path d="${arc(vdot,estEnd,Ro)}" fill="none" stroke="${C.orange}" stroke-width="20" stroke-dasharray="6 5" opacity="0.55"/>
    <path d="${arc(VMIN,VMAX,Ri)}" fill="none" stroke="${C.border}" stroke-width="2" stroke-linecap="round"/>
    ${ticks}
    <line x1="${pax}" y1="${pay}" x2="${pbx}" y2="${pby}" stroke="${C.purple}" stroke-width="2"/>
    <text x="${plx}" y="${ply-5}" text-anchor="middle" fill="${C.purple}" font-size="9" font-weight="700">PB</text>
    <text x="${plx}" y="${ply+5}" text-anchor="middle" fill="${C.purple}" font-size="8">'16</text>
    <line x1="${tax}" y1="${tay}" x2="${tbx}" y2="${tby}" stroke="${C.teal}" stroke-width="2"/>
    <text x="${tlx}" y="${tly-5}" text-anchor="middle" fill="${C.teal}" font-size="9" font-weight="700">≤37'</text>
    <text x="${tlx}" y="${tly+5}" text-anchor="middle" fill="${C.teal}" font-size="8">target</text>
    <line x1="${nx}" y1="${ny}" x2="${nx2}" y2="${ny2}" stroke="${C.orange}" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${nx}" cy="${ny}" r="4" fill="${C.orange}"/>
    <text x="${cx}" y="${cy-52}" text-anchor="middle" fill="${C.text}" font-size="54" font-weight="900" font-family="'Courier New',monospace" letter-spacing="-2">${vdot}</text>
    <text x="${cx}" y="${cy-32}" text-anchor="middle" fill="${C.sub}" font-size="9" letter-spacing="3">VDOT OFICIAL</text>
    <text x="${cx}" y="${cy-12}" text-anchor="middle" fill="${C.orange}" font-size="13" font-weight="600">~${vdotEst} estimado</text>
  </svg>`;
}

function lineChartSVG(data, key, vdotRef){
  const W=300,H=140,padL=26,padR=10,padT=10,padB=18;
  const min=50, max=57;
  const xStep = (W-padL-padR)/(data.length-1);
  const yOf = v => padT + (max-v)/(max-min)*(H-padT-padB);
  const xOf = i => padL + i*xStep;
  let path = data.map((d,i)=>`${i===0?'M':'L'} ${xOf(i).toFixed(1)} ${yOf(d[key]).toFixed(1)}`).join(" ");
  let dots = data.map((d,i)=>`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(d[key]).toFixed(1)}" r="4" fill="${C.orange}"/>`).join("");
  let labels = data.map((d,i)=>`<text x="${xOf(i).toFixed(1)}" y="${H-4}" text-anchor="middle" fill="${C.sub}" font-size="8">${d.x}</text>`).join("");
  let yTicks=[50,52,54,56].map(v=>`<text x="4" y="${(yOf(v)+3).toFixed(1)}" fill="${C.sub}" font-size="8">${v}</text>
    <line x1="${padL}" y1="${yOf(v).toFixed(1)}" x2="${W-padR}" y2="${yOf(v).toFixed(1)}" stroke="${C.border}" stroke-dasharray="3 3"/>`).join("");
  const refY = yOf(vdotRef).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${yTicks}
    <line x1="${padL}" y1="${refY}" x2="${W-padR}" y2="${refY}" stroke="${C.orange}" stroke-dasharray="4 3" stroke-width="1"/>
    <path d="${path}" fill="none" stroke="${C.orange}" stroke-width="2.5"/>
    ${dots}${labels}
  </svg>`;
}

function barChartSVG(data){
  const W=300,H=120,padL=24,padR=6,padT=6,padB=16;
  const max = Math.max(...data.map(d=>d.km))*1.15;
  const bw = (W-padL-padR)/data.length*0.6;
  const step = (W-padL-padR)/data.length;
  let bars = data.map((d,i)=>{
    const h = (d.km/max)*(H-padT-padB);
    const x = padL + i*step + (step-bw)/2;
    const y = H-padB-h;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="5" fill="${d.cur?C.orange:C.dim}"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${H-4}" text-anchor="middle" fill="${C.sub}" font-size="8">${d.w}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${bars}</svg>`;
}

  <div style="background:${C.card};border-radius:12px;border:1px solid ${C.border};overflow:hidden">
    ${D.calibs.map((c,i)=>`
      <div style="padding:10px 14px;${i<D.calibs.length-1?`border-bottom:1px solid ${C.border};`:""}">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="color:${C.orange};font-size:11px;font-weight:700">${c.session}</span>
          <span style="color:${C.sub};font-size:9px">${c.date}</span>
        </div>
        <div style="display:flex;gap:12px">
          <div><div style="color:${C.sub};font-size:8px;letter-spacing:1px">RITMO</div><div style="color:${C.text};font-size:11px;font-family:monospace">${c.pace}</div></div>
          <div><div style="color:${C.sub};font-size:8px;letter-spacing:1px">FC</div><div style="color:${C.text};font-size:11px;font-family:monospace">${c.fc}</div></div>
          <div style="flex:1"><div style="color:${C.sub};font-size:8px;letter-spacing:1px">LEITURA</div><div style="color:${C.z1};font-size:10px">${c.read}</div></div>
        </div>
      </div>`).join("")}
  </div>`;
}

function panelSemana(){
  return `
  ${ST(D.weekLabel, C.orange)}
  <div style="background:${C.card};border-radius:12px;border:1px solid ${C.border};padding:14px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="color:${C.sub};font-size:10px">Volume semanal</span>
      <span style="color:${C.text};font-size:13px;font-weight:700;font-family:monospace">${D.weekDone}<span style="color:${C.sub};font-size:10px">/${D.weekTarget} km</span></span>
    </div>
    <div style="background:${C.border};border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px">
      <div style="background:linear-gradient(90deg,${C.teal},${C.orange});width:${(D.weekDone/D.weekTarget*100).toFixed(0)}%;height:100%;border-radius:6px"></div>
    </div>
    <div style="display:flex;justify-content:space-between">
      <span style="color:${C.teal};font-size:9px">✓ feito: ${D.weekDone}km</span>
      <span style="color:${C.sub};font-size:9px">restante: ${(D.weekTarget-D.weekDone).toFixed(1)}km</span>
    </div>
  </div>

  <div style="background:${C.card};border-radius:12px;border:1px solid ${C.border};overflow:hidden;margin-bottom:16px">
    ${D.sessions.map((s,i)=>`
      <div>
        <div data-session="${i}" style="display:flex;align-items:center;padding:10px 14px;cursor:pointer;
          ${i<D.sessions.length-1||OPEN_IDX===i?`border-bottom:1px solid ${C.border};`:""}
          opacity:${s.status==="planned"?0.55:1};background:${s.status==="today"?C.orange+"08":OPEN_IDX===i?C.card2:"transparent"}">
          <div style="color:${C.sub};font-size:9px;width:38px;flex-shrink:0">${s.day}</div>
          <div style="width:9px;height:9px;border-radius:50%;background:${dotColor(s.status)};margin-right:10px;flex-shrink:0;
            box-shadow:${s.status==="today"?`0 0 8px ${C.orange}`:"none"}"></div>
          <div style="flex:1">
            <span style="color:${s.status==="today"?C.orange:s.status==="race"?C.gold:C.text};
              font-size:12px;font-weight:${["today","race"].includes(s.status)?700:400}">${s.icon} ${s.code}</span>
          </div>
          <span style="color:${C.sub};font-size:10px;font-family:monospace;margin-right:8px">${s.km}km</span>
          ${s.status==="done"?`<span style="color:${C.teal};font-size:12px">✓</span>`:""}
          ${s.status==="today"?`<span style="color:${C.orange};font-size:9px;font-weight:700;background:${C.orange}22;padding:2px 6px;border-radius:4px">HOJE</span>`:""}
          ${s.status==="race"?`<span style="color:${C.gold};font-size:9px;font-weight:700;background:${C.gold}22;padding:2px 6px;border-radius:4px">PROVA</span>`:""}
          <span style="color:${C.sub};font-size:10px;margin-left:8px;transform:rotate(${OPEN_IDX===i?90:0}deg);display:inline-block;transition:transform .15s">›</span>
        </div>
        ${OPEN_IDX===i?`
        <div style="padding:12px 14px 14px;background:${C.card2};${i<D.sessions.length-1?`border-bottom:1px solid ${C.border};`:""}">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
            <span style="background:${C.orange}18;color:${C.orange};border-radius:5px;padding:2px 8px;font-size:9px;font-weight:700">${s.mode||""}</span>
          </div>
          <div style="display:flex;gap:14px;margin-bottom:8px;flex-wrap:wrap">
            ${s.paceReal?`<div><div style="color:${C.sub};font-size:8px;letter-spacing:1px">RITMO REAL</div><div style="color:${C.text};font-size:11px;font-family:monospace">${s.paceReal}</div></div>`:""}
            ${s.paceTarget?`<div><div style="color:${C.sub};font-size:8px;letter-spacing:1px">${s.status==="planned"?"ALVO":"PREVISTO"}</div><div style="color:${C.sub};font-size:11px;font-family:monospace">${s.paceTarget}</div></div>`:""}
            ${s.hrAvg?`<div><div style="color:${C.sub};font-size:8px;letter-spacing:1px">FC MÉDIA</div><div style="color:${C.text};font-size:11px;font-family:monospace">${s.hrAvg} bpm</div></div>`:""}
            ${s.hrMax?`<div><div style="color:${C.sub};font-size:8px;letter-spacing:1px">FC MÁX</div><div style="color:${C.text};font-size:11px;font-family:monospace">${s.hrMax} bpm</div></div>`:""}
          </div>
          <div style="color:${C.sub};font-size:8px;letter-spacing:1px;margin-bottom:3px">${s.status==="planned"?"OBJETIVO":"CONTRIBUIÇÃO PARA A EVOLUÇÃO"}</div>
          <div style="color:${C.text};font-size:11px;line-height:1.5">${s.note||""}</div>
        </div>`:""}
      </div>`).join("")}
  </div>

  ${ST("Carga Semanal · km", C.teal)}
  <div style="background:${C.card};border-radius:12px;border:1px solid ${C.border};padding:14px 6px 8px;margin-bottom:16px">
    ${barChartSVG(D.weeklyLoad)}
  </div>

  ${ST("Training Status · Garmin", C.purple)}
  <div style="background:${C.card};border-radius:12px;border:1px solid ${C.border};padding:12px 14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <div>
        <div style="color:${C.z1};font-size:14px;font-weight:800">${D.trainingStatus}</div>
        <div style="color:${C.sub};font-size:9px">Garmin Training Status</div>
      </div>
      <div style="text-align:right">
        <div style="color:${C.teal};font-size:18px;font-weight:800;font-family:monospace">${D.acwr}</div>
        <div style="color:${C.sub};font-size:9px">ACWR · ÓTIMO</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${[["Limiar Ritmo",D.ltPace+"/km",C.orange],["LTHR",D.lthr+" bpm",C.orange],["VO₂Max Garmin",D.vo2max,C.purple],["Peso",D.weight+" kg",C.sub]]
        .map(([label,value,col])=>`<div style="background:${C.card2};border-radius:8px;padding:8px 10px">
          <div style="color:${C.sub};font-size:8px;letter-spacing:1px;text-transform:uppercase">${label}</div>
          <div style="color:${col};font-size:13px;font-weight:700;font-family:monospace">${value}</div>
        </div>`).join("")}
    </div>
  </div>`;
}

function panelProvas(){
  return `
  ${ST("Calendário de Provas", C.gold)}
  <div style="background:${C.card};border-radius:12px;border:1px solid ${C.border};overflow:hidden;margin-bottom:16px">
    ${D.races.map((r,i)=>`
      <div style="padding:12px 14px;${i<D.races.length-1?`border-bottom:1px solid ${C.border};`:""}border-left:3px solid ${r.col}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="color:${C.sub};font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px">${r.prio}</div>
            <div style="color:${r.prio==="PROVA A"?C.orange:C.text};font-size:13px;font-weight:${r.prio==="PROVA A"?800:600}">${r.name}</div>
            <div style="color:${C.sub};font-size:10px">${r.dist}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="color:${r.col};font-size:12px;font-weight:700;font-family:monospace">${r.date}</div>
            <div style="color:${C.sub};font-size:9px">em ${r.days} dias</div>
          </div>
        </div>
      </div>`).join("")}
  </div>

  ${ST("★ Corrida do Tejo · 13 Set 2026", C.orange)}
  <div style="background:${C.card};border-radius:12px;border:2px solid ${C.orange}44;padding:16px 14px">
    <div style="text-align:center;margin-bottom:16px">
      <div style="color:${C.sub};font-size:9px;letter-spacing:3px">DIAS RESTANTES</div>
      <div style="color:${C.orange};font-size:60px;font-weight:900;font-family:'Courier New',monospace;line-height:1.1">65</div>
      <div style="color:${C.sub};font-size:11px">9 semanas e meia</div>
    </div>
    ${D.phases.map((p,i)=>{
      const pc = p.status==="active"?C.orange:p.status==="next"?C.z3:p.status==="race"?C.gold:C.dim;
      return `<div style="display:flex;gap:10px;align-items:flex-start">
        <div style="display:flex;flex-direction:column;align-items:center">
          <div style="width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0;background:${pc};
            box-shadow:${p.status==="active"?`0 0 10px ${C.orange}`:"none"}"></div>
          ${i<D.phases.length-1?`<div style="width:1.5px;height:22px;background:${C.border};margin-top:3px"></div>`:""}
        </div>
        <div style="padding-bottom:6px">
          <div style="color:${pc};font-size:11px;font-weight:${["active","race"].includes(p.status)?800:500}">${p.label}</div>
          <div style="color:${C.sub};font-size:9px">${p.weeks} · ${p.km}</div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function render(){
  const panel = TAB==="estado" ? panelEstado() : TAB==="semana" ? panelSemana() : panelProvas();
  document.getElementById("app").innerHTML = `
    <div style="background:${C.bg};min-height:100vh;color:${C.text}">
      <div style="background:${C.card};border-bottom:1px solid ${C.border};padding:14px 18px 10px;position:sticky;top:0;z-index:20">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div style="color:${C.sub};font-size:8px;letter-spacing:3px;text-transform:uppercase">M35 · QUELUZ</div>
            <div style="font-size:17px;font-weight:800;letter-spacing:-0.5px">Nelson Coelho</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            ${Badge(D.trainingStatus, C.z1)}
            <div style="font-size:8px;color:${C.teal};letter-spacing:1px">⟳ ${D.meta.updatedAt}</div>
          </div>
        </div>
        ${renderTabs()}
      </div>
      <div style="padding:16px 14px 48px">${panel}</div>
      <div style="text-align:center;color:${C.dim};font-size:8px;letter-spacing:1.5px;margin-top:0;padding-bottom:20px;text-transform:uppercase">
        Garmin · Strava · GetFast · ${D.meta.updatedAt}
      </div>
    </div>`;

  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      TAB = btn.getAttribute("data-tab");
      localStorage.setItem("nc_tab", TAB);
      OPEN_IDX = null;
      render();
      window.scrollTo(0,0);
    });
  });

  document.querySelectorAll("[data-session]").forEach(row=>{
    row.addEventListener("click", ()=>{
      const i = parseInt(row.getAttribute("data-session"), 10);
      OPEN_IDX = OPEN_IDX===i ? null : i;
      render();
    });
  });
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>

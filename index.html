<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nelson Coelho · Dashboard de Treino</title>
<style>
  :root{
    --bg:#07090F; --card:#0D1118; --card2:#131927; --border:#1C2438;
    --orange:#FF5422; --teal:#00D9B0; --purple:#9B59FF; --gold:#F5A623;
    --text:#D4E0FF; --sub:#5A6B8A; --dim:#2C3550;
    --z1:#22C55E; --z2:#86EFAC; --z3:#FDE047; --z4:#FB923C; --z5:#EF4444;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;margin:0;}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;}
  .header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px 10px;position:sticky;top:0;z-index:20;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .eyebrow{color:var(--sub);font-size:8px;letter-spacing:3px;text-transform:uppercase;}
  .name{font-size:17px;font-weight:800;letter-spacing:-0.5px;}
  .badge{background:#22C55E22;border:1px solid #22C55E55;color:var(--z1);border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:1px;white-space:nowrap;}
  .sync{font-size:8px;color:var(--sub);letter-spacing:1px;text-align:right;margin-top:4px;}
  .tabs{display:flex;gap:6px;}
  .tab{background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:6px;padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;}
  .tab.active{background:#FF542220;border-color:var(--orange);color:var(--orange);}
  .content{padding:16px 14px 48px;}
  .pane{display:none;}
  .pane.active{display:block;}
  .st{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .st .bar{width:3px;height:14px;border-radius:2px;}
  .st .label{color:var(--sub);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:16px;}
  .card2{background:var(--card2);border-radius:8px;padding:8px 10px;}
  .metrics-row{display:flex;gap:8px;margin-bottom:8px;}
  .metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;flex:1;min-width:0;}
  .metric .mlabel{color:var(--sub);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
  .metric .mval{font-size:22px;font-weight:800;font-family:monospace;line-height:1;}
  .metric .munit{color:var(--sub);font-size:10px;margin-left:3px;}
  .metric .msub{color:var(--sub);font-size:9px;margin-top:3px;}
  .metric .mtrend{font-size:10px;margin-top:2px;}
  .gauge-wrap{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px 6px 10px;margin-bottom:18px;}
  .gauge-legend{display:flex;justify-content:space-around;padding-top:6px;}
  .gauge-legend div{text-align:center;}
  .gauge-legend .gv{font-size:11px;font-weight:800;font-family:monospace;}
  .gauge-legend .gl{color:var(--sub);font-size:8px;letter-spacing:1px;}
  .zonebar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .zonebar-z{font-size:10px;font-weight:800;width:22px;flex-shrink:0;}
  .zonebar-track{background:var(--border);border-radius:3px;height:6px;}
  .zonebar-fill{height:100%;border-radius:3px;}
  .session-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);}
  .session-row:last-child{border-bottom:none;}
  .session-row.planned{opacity:.55;}
  .session-row.today{background:#FF542208;}
  .sday{color:var(--sub);font-size:9px;width:38px;flex-shrink:0;}
  .sdot{width:9px;height:9px;border-radius:50%;margin-right:10px;flex-shrink:0;}
  .scode{font-size:12px;}
  .skm{color:var(--sub);font-size:10px;font-family:monospace;margin-right:8px;}
  .stag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;}
  .race-row{padding:12px 14px;border-bottom:1px solid var(--border);}
  .race-row:last-child{border-bottom:none;}
  .race-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .race-prio{color:var(--sub);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
  .race-name{font-size:13px;font-weight:600;}
  .race-dist{color:var(--sub);font-size:10px;}
  .race-date{font-size:12px;font-weight:700;font-family:monospace;text-align:right;}
  .race-days{color:var(--sub);font-size:9px;text-align:right;}
  .calib-row{padding:10px 14px;border-bottom:1px solid var(--border);}
  .calib-row:last-child{border-bottom:none;}
  .calib-top{display:flex;justify-content:space-between;margin-bottom:5px;}
  .calib-session{color:var(--orange);font-size:11px;font-weight:700;}
  .calib-date{color:var(--sub);font-size:9px;}
  .calib-cols{display:flex;gap:12px;}
  .calib-col-label{color:var(--sub);font-size:8px;letter-spacing:1px;}
  .calib-col-val{color:var(--text);font-size:11px;font-family:monospace;}
  .calib-read{color:var(--z1);font-size:10px;}
  .phase-item{display:flex;gap:10px;align-items:flex-start;}
  .phase-dot-col{display:flex;flex-direction:column;align-items:center;}
  .phase-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0;}
  .phase-line{width:1.5px;height:22px;background:var(--border);margin-top:3px;}
  .phase-label{font-size:11px;}
  .phase-sub{color:var(--sub);font-size:9px;}
  .footer{text-align:center;color:var(--dim);font-size:8px;letter-spacing:1.5px;margin-top:20px;text-transform:uppercase;}
  .note{background:var(--card2);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:10px;color:var(--sub);line-height:1.5;}
  .note b{color:var(--orange);}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="eyebrow">M35 · QUELUZ</div>

      </div>
      <div>

// ─── HELPERS ────────────────────────────────────────────────────────────
const dotColor = s => ({done:"var(--teal)",today:"var(--orange)",planned:"var(--dim)",race:"var(--gold)"}[s]||"var(--dim)");
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; };

function renderVDOTGauge(vdot, vdotEst){
  const W=320,H=200,cx=160,cy=175,Ro=126,Ri=96,VMIN=48,VMAX=63;
  const vToAngle = v => Math.PI*(1-(v-VMIN)/(VMAX-VMIN));
  const ptAt=(v,r)=>{ const a=vToAngle(v); return [ (cx+r*Math.cos(a)).toFixed(2), (cy-r*Math.sin(a)).toFixed(2) ]; };
  const arc=(v1,v2,R)=>{ const [x1,y1]=ptAt(v1,R),[x2,y2]=ptAt(v2,R); const large=Math.abs(vToAngle(v2)-vToAngle(v1))>Math.PI?1:0; return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`; };
  const estEnd = parseFloat((vdotEst||"").split("–")[1] || (vdot+1.5));
  const [nx,ny]=ptAt(vdot,Ri+6), [nx2,ny2]=ptAt(vdot,Ro+5);
  const ticks=[48,51,53,55,57,60,63].map(v=>{
    const [tx,ty]=ptAt(v,Ri-14),[t1x,t1y]=ptAt(v,Ri),[t2x,t2y]=ptAt(v,Ri-6);
    return `<line x1="${t1x}" y1="${t1y}" x2="${t2x}" y2="${t2y}" stroke="var(--sub)" stroke-width="1.5"/><text x="${tx}" y="${parseFloat(ty)+3}" text-anchor="middle" fill="var(--sub)" font-size="8" font-family="monospace">${v}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <path d="${arc(VMIN,VMAX,Ro)}" fill="none" stroke="var(--dim)" stroke-width="20" stroke-linecap="round"/>
    <path d="${arc(48,51.3,Ro)}" fill="none" stroke="var(--sub)" stroke-width="20" opacity="0.15"/>
    <path d="${arc(51.3,53,Ro)}" fill="none" stroke="var(--z3)" stroke-width="20" opacity="0.2"/>
    <path d="${arc(53,55,Ro)}" fill="none" stroke="var(--orange)" stroke-width="20" opacity="0.18"/>
    <path d="${arc(55,57,Ro)}" fill="none" stroke="var(--purple)" stroke-width="20" opacity="0.18"/>
    <path d="${arc(57,63,Ro)}" fill="none" stroke="var(--teal)" stroke-width="20" opacity="0.18"/>
    <path d="${arc(VMIN,vdot,Ro)}" fill="none" stroke="var(--orange)" stroke-width="20" stroke-linecap="round"/>
    <path d="${arc(vdot,estEnd,Ro)}" fill="none" stroke="var(--orange)" stroke-width="20" stroke-dasharray="6 5" opacity="0.55"/>
    <path d="${arc(VMIN,VMAX,Ri)}" fill="none" stroke="var(--border)" stroke-width="2" stroke-linecap="round"/>
    ${ticks}
    <line x1="${nx}" y1="${ny}" x2="${nx2}" y2="${ny2}" stroke="var(--orange)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${nx}" cy="${ny}" r="4" fill="var(--orange)"/>
    <text x="${cx}" y="${cy-52}" text-anchor="middle" fill="var(--text)" font-size="54" font-weight="900" font-family="'Courier New',monospace" letter-spacing="-2">${vdot}</text>
    <text x="${cx}" y="${cy-32}" text-anchor="middle" fill="var(--sub)" font-size="9" letter-spacing="3">VDOT OFICIAL</text>
    <text x="${cx}" y="${cy-12}" text-anchor="middle" fill="var(--orange)" font-size="13" font-weight="600">~${vdotEst} estimado</text>
  </svg>`;
}

function renderRaceTrendChart(data, vdotCur){
  const W=300,H=140,padL=26,padR=10,padT=10,padB=18;
  const vmin=50, vmax=57;
  const xAt = i => padL + (W-padL-padR) * (i/(data.length-1));
  const yAt = v => padT + (H-padT-padB) * (1 - (v-vmin)/(vmax-vmin));
  const pts = data.map((d,i)=>`${xAt(i)},${yAt(d.vdot)}`).join(" ");
  const dots = data.map((d,i)=>`<circle cx="${xAt(i)}" cy="${yAt(d.vdot)}" r="4" fill="var(--orange)"/>`).join("");
  const labels = data.map((d,i)=>`<text x="${xAt(i)}" y="${H-4}" text-anchor="middle" fill="var(--sub)" font-size="8">${d.x}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">
    <line x1="${padL}" y1="${yAt(vdotCur)}" x2="${W-padR}" y2="${yAt(vdotCur)}" stroke="var(--orange)" stroke-dasharray="4 3" stroke-width="1"/>
    <polyline points="${pts}" fill="none" stroke="var(--orange)" stroke-width="2.5"/>
    ${dots}${labels}
  </svg>`;
}

      <div class="metric"><div class="mlabel">FC Repouso</div><div><span class="mval" style="color:var(--teal)">${D.rhr}</span><span class="munit">bpm</span></div><div class="msub">tendência 45-47</div></div>
    </div>
    <div class="metrics-row">

      <div class="metric"><div class="mlabel">Train. Readiness</div><div><span class="mval" style="color:var(--z3)">${D.readiness}</span><span class="munit">/100</span></div><div class="msub">${D.readinessSub}</div></div>

    </div>

    <div class="st"><div class="bar" style="background:var(--z3)"></div><span class="label">Zonas FC · LTHR ${D.lthr} bpm</span></div>
    <div class="card">
      ${D.hrZones.map(z=>`
        <div class="zonebar-row">
          <div class="zonebar-z" style="color:${z.col}">${z.z}</div>

              <span style="color:var(--sub);font-size:9px;font-family:monospace">${z.bpm}</span>

          </div>

      `).join("")}
      <div class="card2" style="margin-top:8px">
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--sub);font-size:9px">LIMIAR LACTATO</span>
          <span style="color:var(--orange);font-size:12px;font-weight:700;font-family:monospace">${D.ltPace}/km @ ${D.lthr} bpm</span>
        </div>
      </div>
    </div>

    <div class="st"><div class="bar" style="background:var(--purple)"></div><span class="label">Calibrações Recentes</span></div>
    <div class="card" style="padding:0">
      ${D.calibs.map(c=>`
        <div class="calib-row">
          <div class="calib-top"><span class="calib-session">${c.session}</span><span class="calib-date">${c.date}</span></div>
          <div class="calib-cols">
            <div><div class="calib-col-label">RITMO</div><div class="calib-col-val">${c.pace}</div></div>
            <div><div class="calib-col-label">FC</div><div class="calib-col-val">${c.fc}</div></div>
            <div style="flex:1"><div class="calib-col-label">LEITURA</div><div class="calib-read">${c.read}</div></div>

// ─── RENDER: SEMANA ─────────────────────────────────────────────────────
function renderSemana(){
  const p = document.getElementById("pane-semana");
  const maxLoad = Math.max(...D.weeklyLoad.map(w=>w.km), D.weekTarget);
  p.innerHTML = `
    <div class="st"><div class="bar" style="background:var(--orange)"></div><span class="label">${D.weekLabel}</span></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--sub);font-size:10px">Volume semanal</span>
        <span style="font-size:13px;font-weight:700;font-family:monospace">${D.weekDone}<span style="color:var(--sub);font-size:10px">/${D.weekTarget} km</span></span>
      </div>
      <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px">
        <div style="background:linear-gradient(90deg,var(--teal),var(--orange));width:${Math.min(100,(D.weekDone/D.weekTarget)*100)}%;height:100%"></div>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--teal);font-size:9px">✓ feito: ${D.weekDone}km</span>
        <span style="color:var(--sub);font-size:9px">planeado restante: ${(D.weekTarget-D.weekDone).toFixed(1)}km</span>
      </div>
    </div>

    <div class="card" style="padding:0">
      ${D.sessions.map(s=>`
        <div class="session-row ${s.status==='planned'?'planned':''} ${s.status==='today'?'today':''}">
          <div class="sday">${s.day}</div>
          <div class="sdot" style="background:${dotColor(s.status)}${s.status==='today'?';box-shadow:0 0 8px var(--orange)':''}"></div>
          <div style="flex:1"><span class="scode" style="color:${s.status==='today'?'var(--orange)':s.status==='race'?'var(--gold)':'var(--text)'};font-weight:${['today','race'].includes(s.status)?700:400}">${s.icon} ${s.code}</span></div>
          <span class="skm">${s.km}km</span>
          ${s.status==='done'?'<span style="color:var(--teal);font-size:12px">✓</span>':''}
          ${s.status==='today'?'<span class="stag" style="color:var(--orange);background:#FF542222">HOJE</span>':''}
        </div>
      `).join("")}
    </div>

    <div class="st"><div class="bar" style="background:var(--teal)"></div><span class="label">Carga Semanal · km</span></div>
    <div class="card">
      <div style="display:flex;align-items:flex-end;gap:8px;height:110px">
        ${D.weeklyLoad.map(w=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
            <div style="font-size:9px;color:var(--sub);margin-bottom:3px;font-family:monospace">${w.km}</div>
            <div style="width:100%;background:${w.cur?'var(--orange)':'var(--dim)'};border-radius:4px 4px 0 0;height:${(w.km/maxLoad*90)}px"></div>
            <div style="font-size:9px;color:var(--sub);margin-top:4px">${w.w}</div>
          </div>
        `).join("")}
      </div>
      ${D.weeklyLoad.find(w=>w.cur&&w.target)?`<div class="note">Semana atual em curso — alvo do plano: <b>${D.weeklyLoad.find(w=>w.cur).target}km</b> (Semana 30, confirmado na folha de plano).</div>`:""}
    </div>

    <div class="st"><div class="bar" style="background:var(--purple)"></div><span class="label">Training Status · Garmin</span></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="color:var(--z1);font-size:14px;font-weight:800">${D.trainingStatus}</div>
          <div style="color:var(--sub);font-size:9px">Garmin Training Status</div>
        </div>
        <div style="text-align:right">
          <div style="color:var(--teal);font-size:18px;font-weight:800;font-family:monospace">${D.acwr}</div>
          <div style="color:var(--sub);font-size:9px">ACWR · ÓTIMO</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="card2"><div style="color:var(--sub);font-size:8px;letter-spacing:1px;text-transform:uppercase">Limiar Ritmo</div><div style="color:var(--orange);font-size:13px;font-weight:700;font-family:monospace">${D.ltPace}/km</div></div>
        <div class="card2"><div style="color:var(--sub);font-size:8px;letter-spacing:1px;text-transform:uppercase">LTHR</div><div style="color:var(--orange);font-size:13px;font-weight:700;font-family:monospace">${D.lthr} bpm</div></div>
        <div class="card2"><div style="color:var(--sub);font-size:8px;letter-spacing:1px;text-transform:uppercase">VO₂Max Garmin</div><div style="color:var(--purple);font-size:13px;font-weight:700;font-family:monospace">${D.vo2max}</div></div>
        <div class="card2"><div style="color:var(--sub);font-size:8px;letter-spacing:1px;text-transform:uppercase">Peso</div><div style="color:var(--sub);font-size:13px;font-weight:700;font-family:monospace">${D.weight} kg</div></div>
      </div>
    </div>
  `;
}

// ─── RENDER: PROVAS ─────────────────────────────────────────────────────
function renderProvas(){
  const p = document.getElementById("pane-provas");
  const tejo = D.races.find(r=>r.prio==="PROVA A");
  p.innerHTML = `
    <div class="st"><div class="bar" style="background:var(--gold)"></div><span class="label">Calendário de Provas & Compromissos</span></div>
    <div class="card" style="padding:0">
      ${D.races.map(r=>`
        <div class="race-row" style="border-left:3px solid ${r.col}">
          <div class="race-top">
            <div>
              <div class="race-prio">${r.prio}</div>
              <div class="race-name" style="color:${r.prio==='PROVA A'?'var(--orange)':'var(--text)'};font-weight:${r.prio==='PROVA A'?800:600}">${r.name}</div>
              <div class="race-dist">${r.dist}</div>
            </div>
            <div>
              <div class="race-date" style="color:${r.col}">${r.date}</div>
              <div class="race-days">em ${r.days} dias</div>
            </div>
          </div>
        </div>
      `).join("")}
    </div>

    <div class="st"><div class="bar" style="background:var(--orange)"></div><span class="label">★ Corrida do Tejo · 13 Set 2026</span></div>
    <div class="card" style="border:2px solid #FF542244;padding:16px 14px">
      <div style="text-align:center;margin-bottom:16px">
        <div style="color:var(--sub);font-size:9px;letter-spacing:3px">DIAS RESTANTES</div>
        <div style="color:var(--orange);font-size:60px;font-weight:900;font-family:'Courier New',monospace;line-height:1.1">${tejo?tejo.days:'--'}</div>
        <div style="color:var(--sub);font-size:11px">sub-40 · objetivo A</div>
      </div>
      ${D.phases.map((ph,i)=>{
        const pc = ph.status==='active'?'var(--orange)':ph.status==='next'?'var(--z3)':ph.status==='race'?'var(--gold)':'var(--dim)';
        return `<div class="phase-item">
          <div class="phase-dot-col">
            <div class="phase-dot" style="background:${pc}${ph.status==='active'?';box-shadow:0 0 10px var(--orange)':''}"></div>
            ${i<D.phases.length-1?'<div class="phase-line"></div>':''}
          </div>
          <div style="padding-bottom:6px">
            <div class="phase-label" style="color:${pc};font-weight:${['active','race'].includes(ph.status)?800:500}">${ph.label}</div>
            <div class="phase-sub">${ph.weeks} · ${ph.km}</div>
          </div>
        </div>`;
      }).join("")}
    </div>
  `;
}

// ─── INIT / TABS ────────────────────────────────────────────────────────
document.getElementById("statusBadge").textContent = D.trainingStatus;
document.getElementById("syncLine").textContent = "⚠ upload manual · " + D.meta.updatedAt;
document.getElementById("footerLine").textContent = "Garmin · Strava · GetFast · " + D.meta.updatedAt;

document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".pane").forEach(pn=>pn.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("pane-"+btn.dataset.tab).classList.add("active");
  });
});

renderEstado();
renderSemana();
renderProvas();
</script>
</body>
</html>
